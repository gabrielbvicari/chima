[cmd_duration]
min_time = 1
style = 'bg:#101010 fg:#707070'
format = '[оӮі [$duration](bold bg:#101010 fg:#707070) пү’ ]($style)'

[status]
style = 'bg:#101010'
symbol = '[вңҳ](bg:#101010 fg:red)'
success_symbol = '[вң” ](bg:#101010 fg:green)'
format = '[[$signal_name](bg:#101010 fg:red) $symbol ]($style)'
map_symbol = false
disabled = false

[sudo]
symbol = "о·’"
style = 'bg:#101010 fg:#707070'
format = '[ $symbol  оӮі]($style)'
disabled = false

[character]
style = 'bg:#101010'
success_symbol = '[вң”](bg:#101010 fg:green)'
error_symbol = '[вңҳ](bg:#101010 fg:red)'
format = '[[$signal_name](bg:#101010 fg:red) $symbol  ]($style)'
map_symbol = false
disabled = true

[username]
show_always = true
style_user = " bg:#101010 fg:#c7c7c7"
style_root = "bg:#101010 fg:#c7c7c7"
format = '[ $user]($style)'
disabled = false

[hostname]
ssh_only = false
style = 'bg:#101010 fg:#c7c7c7'
format = '[@$hostname]($style)'
disabled = false

[localip]
ssh_only = true
style = 'bg:#101010 fg:#707070'
format = '[:$localipv4]($style)'
disabled = false

[time]
disabled = false
time_format = "%T"
style = "bg:#101010 fg:#567676"
format = '[ $time ]($style)'

[directory]
style = "bg:#101010 fg:#0a96d6"
format = "[ п„•  $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = false
fish_style_pwd_dir_length = 1
home_symbol = '~'

[directory.substitutions]
"~" = "пҖ•  ~"
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"MantisAI" = "у°ІӢ "

[fill]
symbol = ' '

[git_branch]
style = "bg:#101010 fg:#56b60a"
format = '[оӮұ](bg:#101010 fg:#707070)[ п„“ п„Ұ](bg:#101010 fg:#56b60a)[ $branch](bold $style)'
truncation_length = 10
truncation_symbol = "вҖҰ"

[git_status]
style = "bg:#101010 fg:#0a96d6"
conflicted = "~ "
up_to_date = "пҒҶ "
untracked = "? "
ahead = "вҮЎ${count} "
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "
behind = "вҮЈ${count} "
stashed = "* "
modified = "пҒ„ "
staged = '[++\($count\) ](bg:#101010 fg:#56b60a)'
renamed = "пҒ„ "
deleted = "пҖ” "
format = '[ $all_status$ahead_behind ]($style)'

